version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: lattice-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: lattice_coding
      MYSQL_USER: admin
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../migrations/mysql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7.0
    container_name: lattice-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: ankane/pgvector:latest
    container_name: lattice-postgres
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lattice_coding
      POSTGRES_USER: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../migrations/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d lattice_coding"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: lattice-api
    command: /app/api
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - LATTICE_WORKSPACE_DIR=/workspace
    volumes:
      - ../../test_workspace:/workspace

volumes:
  mysql_data:
  redis_data:
  postgres_data:
