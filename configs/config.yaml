app:
  name: lattice-coding
  env: development
  port: 8080
  debug: true

mysql:
  host: localhost
  port: 3306
  username: admin
  password: password
  database: lattice_coding
  charset: utf8mb4
  max_open_conns: 20
  max_idle_conns: 10
  conn_max_lifetime: 300s
  conn_max_idle_time: 600s
  log_level: silent

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 20
  min_idle_conns: 5
  dial_timeout: 5s
  pool_timeout: 4s
  max_retries: 3

postgres:
  host: localhost
  port: 5432
  username: admin
  password: password
  database: lattice_coding
  ssl_mode: disable

llm:
  chat_memory:
    compression_threshold: 80
    retain_after_compress: 20
    cache_ttl: 24h
  pool:
    max_concurrent: 10
    acquire_timeout: 3s
  stream:
    max_concurrent: 8
    acquire_timeout: 3s
  timeout:
    sync_call: 60s
    stream_idle: 120s
    health_check: 10s
  retry:
    max_attempts: 2
    initial_interval: 500ms
    max_interval: 5s
  circuit_breaker:
    enabled: true
    window: 60s
    min_requests: 10
    failure_rate_threshold: 0.5
    slow_call_threshold: 30s
    slow_call_rate_threshold: 0.6
    open_duration: 30s
    half_open_max_requests: 3
  routing:
    default:
      primary: claude-sonnet
      fallback:
        - gpt-4.1
        - deepseek-chat
        - qwen-plus
        - ollama-qwen-coder

logging:
  level: info
  format: json
  output: stdout

http:
  timeout: 30s
  read_timeout: 30s
  write_timeout: 60s
  idle_timeout: 120s

worker:
  concurrency: 10
  queue_name: agent_run
